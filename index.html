<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Draw & Guess Party V2</title>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="firebase-config.js"></script><script src="prompts.js"></script>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial;background:radial-gradient(circle at top,#244de0,#08104d 60%,#030620);color:white;min-height:100vh}
header{text-align:center;padding:18px;background:#020626e8}h1{margin:0;font-size:clamp(2rem,6vw,4rem)}main{width:min(1100px,94vw);margin:20px auto}.panel{background:#f5f7ff;color:#101633;border-radius:16px;padding:20px;margin-bottom:18px}.hidden{display:none!important}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px}.cat{padding:12px;border:0;border-radius:10px;background:#dfe6ff;font-weight:800}.cat.active{background:#143bd1;color:#fff;outline:3px solid #ffd84d}
button,input{font:inherit;padding:12px;border-radius:10px;border:1px solid #9aa5d1}button{border:0;font-weight:900}.primary{background:#ffd84d}.secondary{background:#dfe6ff;color:#07145c}.danger{background:#ff6b6b}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.room{display:grid;grid-template-columns:1fr 220px;gap:20px}.code{font-size:4rem;font-weight:900;color:#143bd1;letter-spacing:.12em}.players{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}.player{background:#e7ebff;padding:10px;border-radius:9px;font-weight:800}
#qr{background:white;padding:10px;width:max-content}.progress{height:16px;background:#d8def8;border-radius:99px;overflow:hidden}.bar{height:100%;background:#143bd1;width:0}.entry{background:white;border:2px solid #b8c2ef;border-radius:12px;padding:14px;margin:12px 0}.entry img{width:100%;max-height:420px;object-fit:contain}.type{font-size:.8rem;font-weight:900;color:#143bd1;text-transform:uppercase}.content{font-size:1.5rem;font-weight:800;margin-top:8px}
@media(max-width:700px){.room{grid-template-columns:1fr}.code{text-align:center}}
</style></head><body>
<header><h1>Draw & Guess Party V2</h1><div>Clean rebuild for the new-draw Firebase project</div><div style="margin-top:10px"><button class="secondary" id="testFirebase">Test Firebase</button></div></header><main>
<section class="panel" id="setup"><h2>Choose a category</h2><div class="grid" id="cats"></div><div class="row" style="margin-top:15px"><button class="primary" id="create">Create Game</button></div></section>
<section class="panel hidden" id="lobby"><div class="room"><div><div>Room code</div><div class="code" id="code"></div><div class="row"><button class="secondary" id="copy">Copy Player Link</button><button class="primary" id="start">Start Game</button></div><h3>Players (<span id="count">0</span>)</h3><div class="players" id="players"></div></div><div id="qr"></div></div></section>
<section class="panel hidden" id="play"><h2 id="status"></h2><div class="progress"><div class="bar" id="bar"></div></div><div class="row" style="justify-content:center;margin-top:15px"><button class="primary" id="advance">Advance</button><button class="danger" id="end">End Game</button></div></section>
<section class="panel hidden" id="reveal"><div class="row" style="justify-content:space-between"><h2 id="title"></h2><div><button class="secondary" id="prev">Previous</button><button class="primary" id="next">Next</button></div></div><div id="chain"></div></section>
</main><script>
if(!window.FIREBASE_CONFIG||!window.FIREBASE_CONFIG.apiKey){alert("firebase-config.js did not load");throw new Error("Missing Firebase config")}if(!firebase.apps.length)firebase.initializeApp(window.FIREBASE_CONFIG);const db=firebase.database(),$=x=>document.getElementById(x);let cat="Kids",room="",ref=null,players={},order=[],step=0,total=0,reveal=0;
Object.keys(window.DGP_PROMPTS).forEach(c=>{const b=document.createElement("button");b.className="cat"+(c===cat?" active":"");b.textContent=c;b.onclick=()=>{cat=c;document.querySelectorAll(".cat").forEach(x=>x.classList.remove("active"));b.classList.add("active")};$("cats").appendChild(b)});

$("testFirebase").onclick=async()=>{try{const t=db.ref("connectionTests/"+Date.now());await t.set({ok:true});await t.remove();alert("Firebase connection works.")}catch(e){alert("Firebase test failed: "+e.message)}};
function code(){const a="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";return Array.from({length:6},()=>a[Math.floor(Math.random()*a.length)]).join("")}function purl(){const u=new URL("player.html",location.href);u.searchParams.set("room",room);return u.toString()}
$("create").onclick=async()=>{room=code();ref=db.ref("drawGuessRooms/"+room);await ref.set({active:true,phase:"lobby",category:cat,createdAt:firebase.database.ServerValue.TIMESTAMP});$("setup").classList.add("hidden");$("lobby").classList.remove("hidden");$("code").textContent=room;new QRCode($("qr"),{text:purl(),width:200,height:200});ref.child("players").on("value",s=>{players=s.val()||{};$("count").textContent=s.numChildren();$("players").innerHTML="";Object.values(players).sort((a,b)=>(a.seat||0)-(b.seat||0)).forEach(p=>{const d=document.createElement("div");d.className="player";d.textContent=p.name;$("players").appendChild(d)})});ref.child("submissions").on("value",s=>{if(order.length){$("bar").style.width=(s.numChildren()/order.length*100)+"%";$("status").textContent=`Pass ${step} of ${total}: ${s.numChildren()} of ${order.length} submitted`}})};
$("copy").onclick=()=>navigator.clipboard.writeText(purl()).then(()=>alert("Player link copied"));
function words(n){let a=[...window.DGP_PROMPTS[cat]];a.sort(()=>Math.random()-.5);while(a.length<n)a.push(...a);return a.slice(0,n)}
$("start").onclick=async()=>{order=Object.entries(players).sort((a,b)=>(a[1].seat||0)-(b[1].seat||0)).map(x=>x[0]);if(order.length<3)return alert("At least 3 players are needed.");total=order.length;step=1;const w=words(order.length),u={phase:"play",order,totalSteps:total,step,submissions:null};order.forEach((id,i)=>{u[`chains/${id}/ownerName`]=players[id].name;u[`chains/${id}/entries/0`]={type:"word",content:w[i],author:"Game"}});await ref.update(u);$("lobby").classList.add("hidden");$("play").classList.remove("hidden");$("status").textContent=`Pass 1 of ${total}`};
$("advance").onclick=async()=>{const s=await ref.child("submissions").once("value");if(s.numChildren()<order.length&&!confirm("Not everyone submitted. Continue?"))return;if(step>=total){await ref.update({phase:"reveal"});$("play").classList.add("hidden");$("reveal").classList.remove("hidden");show();return}step++;await ref.update({step,submissions:null});$("bar").style.width="0";$("status").textContent=`Pass ${step} of ${total}`};
async function show(){const id=order[reveal],s=await ref.child("chains/"+id).once("value"),c=s.val();$("title").textContent=`${c.ownerName}'s Chain (${reveal+1}/${order.length})`;$("chain").innerHTML="";Object.keys(c.entries||{}).sort((a,b)=>a-b).forEach(k=>{const e=c.entries[k],box=document.createElement("div");box.className="entry";box.innerHTML=`<div class="type">${e.type} — ${e.author||""}</div>`;if(e.type==="drawing"){const i=document.createElement("img");i.src=e.content;box.appendChild(i)}else{const d=document.createElement("div");d.className="content";d.textContent=e.content;box.appendChild(d)}$("chain").appendChild(box)})}
$("next").onclick=()=>{reveal=(reveal+1)%order.length;show()};$("prev").onclick=()=>{reveal=(reveal-1+order.length)%order.length;show()};$("end").onclick=async()=>{await ref.update({active:false});location.reload()};
</script></body></html>
