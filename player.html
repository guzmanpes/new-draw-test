<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><title>Draw & Guess Player V2</title>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script><script src="firebase-config.js"></script>
<style>*{box-sizing:border-box}body{margin:0;background:#07145c;color:white;font-family:Arial;min-height:100vh}.wrap{max-width:850px;margin:auto;padding:14px}.card{background:white;color:#111;border-radius:16px;padding:16px}.hidden{display:none!important}input,button,textarea{font:inherit;padding:13px;border-radius:10px;border:1px solid #9aa5d1}button{border:0;font-weight:900}.primary{background:#ffd84d}.secondary{background:#dfe6ff}.danger{background:#ff6b6b}.prompt{font-size:clamp(1.5rem,5vw,2.5rem);font-weight:900;text-align:center;margin:10px}.canvas{border:4px solid #111;border-radius:12px;overflow:hidden;touch-action:none}canvas{display:block;width:100%;height:430px;background:white;touch-action:none}.tools{display:flex;gap:8px;margin-top:10px}.tools button{flex:1}.preview{width:100%;max-height:360px;object-fit:contain;border:3px solid #111;border-radius:10px}.guess{width:100%;min-height:120px;font-size:1.3rem}</style></head><body><div class="wrap"><h1 style="text-align:center">Draw & Guess</h1>
<div class="card" id="join"><input id="name" placeholder="Your name" style="width:100%;margin-bottom:10px"><button class="primary" id="joinBtn" style="width:100%">Join Game</button></div>
<div class="card hidden" id="wait"><div class="prompt" id="waitText">Waiting for host…</div></div>
<div class="card hidden" id="task"><div class="prompt" id="prompt"></div><img id="preview" class="preview hidden"><div id="draw" class="hidden"><div class="canvas"><canvas id="canvas"></canvas></div><div class="tools"><button class="secondary" id="undo">Undo</button><button class="danger" id="clear">Clear</button><button class="primary" id="sendDraw">Submit</button></div></div><div id="guessArea" class="hidden"><textarea id="guess" class="guess" placeholder="What is the drawing?"></textarea><button class="primary" id="sendGuess" style="width:100%;margin-top:10px">Submit Guess</button></div></div></div>
<script>
if(!window.FIREBASE_CONFIG||!window.FIREBASE_CONFIG.apiKey){alert("firebase-config.js did not load");throw new Error("Missing Firebase config")}if(!firebase.apps.length)firebase.initializeApp(window.FIREBASE_CONFIG);const db=firebase.database(),$=x=>document.getElementById(x),room=(new URLSearchParams(location.search).get("room")||"").toUpperCase(),ref=db.ref("drawGuessRooms/"+room);let pid=localStorage.dgPid||("p_"+Math.random().toString(36).slice(2));localStorage.dgPid=pid;let name=localStorage.dgName||"",order=[],step=0,owner="",strokes=[],cur=[],down=false;if(name)$("name").value=name;
$("joinBtn").onclick=async()=>{name=$("name").value.trim();if(!name)return alert("Enter your name");localStorage.dgName=name;const a=await ref.child("active").once("value");if(!a.val())return alert("Room not found");const p=await ref.child("players").once("value");await ref.child("players/"+pid).set({name,seat:p.numChildren()});$("join").classList.add("hidden");$("wait").classList.remove("hidden");listen()};
function showWait(t){$("task").classList.add("hidden");$("wait").classList.remove("hidden");$("waitText").textContent=t}
function listen(){ref.on("value",async s=>{const r=s.val();if(!r||r.active===false)return showWait("Game ended.");if(r.phase==="lobby")return showWait("Waiting for host…");if(r.phase==="reveal")return showWait("Watch the reveal on the main screen.");if(r.submissions&&r.submissions[pid])return showWait("Submitted! Waiting for everyone…");order=r.order||[];step=r.step||1;const i=order.indexOf(pid),oi=(i-(step-1)+order.length)%order.length;owner=order[oi];const e=(await ref.child(`chains/${owner}/entries/${step-1}`).once("value")).val();$("wait").classList.add("hidden");$("task").classList.remove("hidden");if(step%2){$("prompt").textContent=e.type==="word"?"Draw: "+e.content:"Draw this guess: "+e.content;$("preview").classList.add("hidden");$("draw").classList.remove("hidden");$("guessArea").classList.add("hidden");clear()}else{$("prompt").textContent="What do you think this drawing is?";$("preview").src=e.content;$("preview").classList.remove("hidden");$("draw").classList.add("hidden");$("guessArea").classList.remove("hidden");$("guess").value=""}})}
const c=$("canvas"),x=c.getContext("2d");function size(){const r=c.getBoundingClientRect();c.width=Math.max(600,r.width*2);c.height=860;x.lineWidth=14;x.lineCap="round";redraw()}function point(e){const r=c.getBoundingClientRect(),p=e.touches?.[0]||e.changedTouches?.[0]||e;return{x:(p.clientX-r.left)*c.width/r.width,y:(p.clientY-r.top)*c.height/r.height}}function begin(e){e.preventDefault();down=true;cur=[point(e)]}function move(e){if(!down)return;e.preventDefault();const p=point(e),q=cur[cur.length-1];cur.push(p);x.beginPath();x.moveTo(q.x,q.y);x.lineTo(p.x,p.y);x.stroke()}function end(e){if(!down)return;e.preventDefault();down=false;strokes.push(cur);cur=[]}function redraw(){x.fillStyle="white";x.fillRect(0,0,c.width,c.height);x.strokeStyle="#111";strokes.forEach(s=>{if(s.length<2)return;x.beginPath();x.moveTo(s[0].x,s[0].y);s.slice(1).forEach(p=>x.lineTo(p.x,p.y));x.stroke()})}function clear(){strokes=[];redraw()}
["pointerdown","touchstart","mousedown"].forEach(v=>c.addEventListener(v,begin,{passive:false}));["pointermove","touchmove","mousemove"].forEach(v=>c.addEventListener(v,move,{passive:false}));["pointerup","touchend","mouseup","mouseleave"].forEach(v=>c.addEventListener(v,end,{passive:false}));$("undo").onclick=()=>{strokes.pop();redraw()};$("clear").onclick=clear;
async function submit(type,content){await ref.child(`chains/${owner}/entries/${step}`).set({type,content,author:name});await ref.child(`submissions/${pid}`).set(true)}
$("sendDraw").onclick=()=>submit("drawing",c.toDataURL("image/jpeg",.72));$("sendGuess").onclick=()=>{const g=$("guess").value.trim();if(g)submit("guess",g)};setTimeout(size,200);window.addEventListener("resize",()=>setTimeout(size,100));
</script></body></html>
