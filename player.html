<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Draw & Guess Player V3</title>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<style>
:root{--blue:#1943d3;--navy:#07124f;--gold:#ffd84d;--cream:#f7f8ff;--ink:#11152e;--danger:#ff6b6b}
*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(160deg,#2148d8,#07104f 62%,#02051d);color:white}.hidden{display:none!important}.wrap{max-width:900px;margin:auto;padding:14px}.card{background:var(--cream);color:var(--ink);border-radius:18px;padding:16px;box-shadow:0 16px 40px #0005}h1{text-align:center}.room{text-align:center;font-weight:900;color:#dbe2ff;margin-bottom:10px}
button,input,textarea,select{font:inherit}.btn{border:0;border-radius:10px;padding:12px 14px;font-weight:900}.primary{background:var(--gold)}.secondary{background:#dfe6ff;color:var(--navy)}.danger{background:var(--danger)}input,textarea,select{width:100%;padding:12px;border:1px solid #aab4dc;border-radius:10px;background:white}.prompt{text-align:center;font-size:clamp(1.4rem,5vw,2.4rem);font-weight:900;margin:10px 0}.task-type{text-align:center;color:var(--blue);font-size:.8rem;text-transform:uppercase;font-weight:900}.wait{text-align:center;padding:45px 10px;font-size:1.3rem;font-weight:900}.preview{display:block;width:100%;max-height:360px;object-fit:contain;background:white;border:3px solid #111;border-radius:10px}.canvas-wrap{border:4px solid #111;border-radius:12px;overflow:hidden;touch-action:none}canvas{display:block;width:100%;height:430px;background:white;touch-action:none}.tools{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:9px}.palette{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:10px 0}.color{width:36px;height:36px;border-radius:50%;border:3px solid white;box-shadow:0 0 0 2px #9aa4cc}.guess{min-height:130px;font-size:1.2rem}.status{text-align:center;font-weight:900;margin-top:8px}
@media(max-width:600px){.tools{grid-template-columns:repeat(2,1fr)}}
</style></head><body>
<div class="wrap"><h1>Draw & Guess V3</h1><div class="room">Room: <span id="roomText"></span></div>
<div class="card" id="joinCard"><input id="nameInput" placeholder="Your name" maxlength="24"><button class="btn primary" id="joinBtn" style="width:100%;margin-top:10px">Join Game</button></div>
<div class="card hidden" id="waitingCard"><div class="wait" id="waitingText">Waiting for host…</div></div>
<div class="card hidden" id="taskCard"><div class="task-type" id="taskType"></div><div class="prompt" id="promptText"></div><img id="preview" class="preview hidden">
<div id="drawArea" class="hidden"><div class="canvas-wrap"><canvas id="canvas"></canvas></div><div class="tools"><button class="btn secondary" id="undoBtn">Undo</button><button class="btn secondary" id="redoBtn">Redo</button><button class="btn secondary" id="eraserBtn">Eraser</button><button class="btn danger" id="clearBtn">Clear</button></div><select id="sizeSelect" style="margin-top:8px"><option value="4">Thin</option><option value="8" selected>Medium</option><option value="14">Thick</option></select><div class="palette" id="palette"></div><button class="btn primary" id="submitDrawingBtn" style="width:100%">Submit Drawing</button></div>
<div id="guessArea" class="hidden"><textarea id="guessInput" class="guess" placeholder="What do you think this is?"></textarea><button class="btn primary" id="submitGuessBtn" style="width:100%;margin-top:10px">Submit Guess</button></div><div class="status" id="statusText"></div></div></div>
<script>
const FIREBASE_CONFIG = {"apiKey": "AIzaSyB3mwtYzoaRG2EB_eU7NmwjuG3-7TuVgs0", "authDomain": "new-draw.firebaseapp.com", "databaseURL": "https://new-draw-default-rtdb.firebaseio.com", "projectId": "new-draw", "storageBucket": "new-draw.firebasestorage.app", "messagingSenderId": "462574759617", "appId": "1:462574759617:web:0874c2591a54bfcecfae40"};
(() => {
  const $=id=>document.getElementById(id);
  if(!firebase.apps.length)firebase.initializeApp(FIREBASE_CONFIG);
  const db=firebase.database(),room=(new URLSearchParams(location.search).get("room")||"").toUpperCase(),ref=db.ref("drawGuessRooms/"+room);
  $("roomText").textContent=room||"Missing";
  let pid=localStorage.getItem("dgpV3Pid")||("p_"+Math.random().toString(36).slice(2)+Date.now().toString(36));localStorage.setItem("dgpV3Pid",pid);
  let name=localStorage.getItem("dgpV3Name")||"",order=[],step=0,owner="",strokes=[],redo=[],current=[],drawing=false,color="#111",size=8,eraser=false,submitted=false,lastStep=0;
  if(name)$("nameInput").value=name;
  const canvas=$("canvas"),ctx=canvas.getContext("2d"),colors=["#111","#e63946","#ff8c42","#ffd43b","#2a9d8f","#1d70f7","#7b2cbf","#ff5da2"];
  const wait=t=>{$("taskCard").classList.add("hidden");$("waitingCard").classList.remove("hidden");$("waitingText").textContent=t};
  const showTask=()=>{$("waitingCard").classList.add("hidden");$("taskCard").classList.remove("hidden")};
  function palette(){$("palette").innerHTML="";colors.forEach(c=>{const b=document.createElement("button");b.className="color";b.style.background=c;b.onclick=()=>{color=c;eraser=false;$("eraserBtn").textContent="Eraser"};$("palette").appendChild(b)})}
  function resize(){const r=canvas.getBoundingClientRect(),scale=Math.min(devicePixelRatio||1,2);canvas.width=Math.max(700,Math.floor(r.width*scale));canvas.height=Math.floor(430*scale);redraw()}
  function point(e){const r=canvas.getBoundingClientRect(),p=e.touches?.[0]||e.changedTouches?.[0]||e;return{x:(p.clientX-r.left)*canvas.width/r.width,y:(p.clientY-r.top)*canvas.height/r.height,color:eraser?"#fff":color,size}}
  function begin(e){e.preventDefault();drawing=true;redo=[];current=[point(e)]}function move(e){if(!drawing)return;e.preventDefault();const p=point(e),q=current[current.length-1];current.push(p);ctx.strokeStyle=p.color;ctx.lineWidth=p.size*canvas.width/canvas.getBoundingClientRect().width;ctx.lineCap="round";ctx.lineJoin="round";ctx.beginPath();ctx.moveTo(q.x,q.y);ctx.lineTo(p.x,p.y);ctx.stroke()}function end(e){if(!drawing)return;e.preventDefault();drawing=false;if(current.length)strokes.push(current);current=[]}
  function redraw(){ctx.fillStyle="#fff";ctx.fillRect(0,0,canvas.width,canvas.height);strokes.forEach(s=>{if(s.length<2)return;ctx.strokeStyle=s[0].color;ctx.lineWidth=s[0].size*canvas.width/canvas.getBoundingClientRect().width;ctx.lineCap="round";ctx.lineJoin="round";ctx.beginPath();ctx.moveTo(s[0].x,s[0].y);s.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));ctx.stroke()})}function clear(){strokes=[];redo=[];redraw()}
  $("joinBtn").onclick=async()=>{try{name=$("nameInput").value.trim();if(!name)return alert("Enter your name.");localStorage.setItem("dgpV3Name",name);const active=await ref.child("active").once("value");if(!active.val())return alert("Room not found.");const ps=await ref.child("players").once("value"),seat=ps.child(pid).val()?.seat??ps.numChildren();await ref.child("players/"+pid).set({name,seat});ref.child("players/"+pid).onDisconnect().remove();$("joinCard").classList.add("hidden");$("waitingCard").classList.remove("hidden");listen()}catch(e){alert("Could not join: "+e.message)}};
  function listen(){ref.on("value",async s=>{const r=s.val();if(!r||r.active===false)return wait("Game ended.");if(r.phase==="lobby")return wait("Waiting for host…");if(r.phase==="reveal")return wait("Watch the reveal on the main screen.");order=r.order||[];step=r.step||1;if(r.submissions&&r.submissions[pid])return wait("Submitted! Waiting for everyone…");const i=order.indexOf(pid);if(i<0)return wait("You joined after the game started.");owner=order[(i-(step-1)+order.length)%order.length];const e=(await ref.child(`chains/${owner}/entries/${step-1}`).once("value")).val();if(!e)return wait("Waiting for previous entry…");submitted=false;showTask();if(step!==lastStep){lastStep=step;clear()}if(step%2){$("taskType").textContent="Drawing Turn";$("promptText").textContent=e.type==="word"?"Draw: "+e.content:"Draw this guess: "+e.content;$("preview").classList.add("hidden");$("drawArea").classList.remove("hidden");$("guessArea").classList.add("hidden");setTimeout(resize,50)}else{$("taskType").textContent="Guessing Turn";$("promptText").textContent="What do you think this is?";$("preview").src=e.content;$("preview").classList.remove("hidden");$("drawArea").classList.add("hidden");$("guessArea").classList.remove("hidden");$("guessInput").value=""}})}
  async function submit(type,content){if(submitted)return;submitted=true;try{await ref.child(`chains/${owner}/entries/${step}`).set({type,content,author:name});await ref.child("submissions/"+pid).set(true);wait("Submitted! Waiting for everyone…")}catch(e){submitted=false;alert(e.message)}}
  $("undoBtn").onclick=()=>{if(strokes.length){redo.push(strokes.pop());redraw()}};$("redoBtn").onclick=()=>{if(redo.length){strokes.push(redo.pop());redraw()}};$("eraserBtn").onclick=()=>{eraser=!eraser;$("eraserBtn").textContent=eraser?"Eraser On":"Eraser"};$("clearBtn").onclick=()=>{if(confirm("Clear drawing?"))clear()};$("sizeSelect").onchange=e=>size=Number(e.target.value);$("submitDrawingBtn").onclick=()=>{if(!strokes.length&&!confirm("Submit blank drawing?"))return;submit("drawing",canvas.toDataURL("image/jpeg",.76))};$("submitGuessBtn").onclick=()=>{const g=$("guessInput").value.trim();if(!g)return alert("Enter a guess.");submit("guess",g)};
  ["pointerdown","mousedown","touchstart"].forEach(n=>canvas.addEventListener(n,begin,{passive:false}));["pointermove","mousemove","touchmove"].forEach(n=>canvas.addEventListener(n,move,{passive:false}));["pointerup","pointercancel","mouseup","mouseleave","touchend"].forEach(n=>canvas.addEventListener(n,end,{passive:false}));palette();setTimeout(resize,100);window.addEventListener("resize",()=>setTimeout(resize,100));
})();
</script></body></html>
